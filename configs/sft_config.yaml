# Supervised Fine-Tuning Configuration (Phase 1)

training:
  num_epochs: 5                  # More epochs for stronger adaptation (was 3)
  learning_rate: 2.0e-5
  per_device_batch_size: 4
  gradient_accumulation_steps: 4
  max_seq_length: 1024
  warmup_ratio: 0.05
  weight_decay: 0.1

optimizer:
  beta1: 0.9
  beta2: 0.95
  max_grad_norm: 1.0

data:
  train_split: 0.9
  max_theorems: null          # null = use all extracted theorems
  filter_domains:             # Subset of Mathlib4 to filter for
    - "Analysis"
    - "Geometry/Manifold"
    - "Topology"
    - "LinearAlgebra"
    - "GroupTheory"

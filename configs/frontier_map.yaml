- name: planck_breakdown
  zone_type: breakdown
  description: "The Planck scale: where general relativity and quantum field theory\
    \ become mutually incompatible. Spacetime is expected to lose its smooth manifold\
    \ structure. All perturbative approaches fail. The breakdown is fundamental \u2014\
    \ not a failure of technique but a signal that our current mathematical framework\
    \ (smooth manifolds + quantum fields on them) is incomplete."
  boundary_conditions:
  - name: planck_energy
    boundary_type: energy_scale
    formal_expression: "E \u2265 E_Planck = sqrt(\u0127c\u2075/G) \u2248 1.22 \xD7\
      \ 10^19 GeV"
    value: 1.22e+19
    description: Energies at or above the Planck scale
    checkable: false
    required_theorems: []
  - name: planck_length_boundary
    boundary_type: length_scale
    formal_expression: "L \u2264 l_Planck = sqrt(\u0127G/c\xB3) \u2248 1.616 \xD7\
      \ 10^-35 m"
    value: 1.616e-35
    description: Lengths at or below the Planck length
    checkable: false
    required_theorems: []
  - name: quantum_gravity_regime
    boundary_type: curvature
    formal_expression: "R_\u03BC\u03BD\u03C1\u03C3 R^\u03BC\u03BD\u03C1\u03C3 ~ l_Planck^-4,\
      \ or equivalently, when the Compton wavelength ~ Schwarzschild radius"
    value: null
    description: Curvature invariants at Planckian values
    checkable: false
    required_theorems: []

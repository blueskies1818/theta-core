  - hierarchy_problem
  - neutrino_masses
  - baryon_asymmetry
- name: qed
  zone_type: established
  description: 'Quantum Electrodynamics: U(1) gauge theory. The most precisely tested
    theory in physics. Electron g-factor matches theory to 12 decimal places.'
  boundary_conditions:
  - name: u1_gauge_theory
    boundary_type: gauge_group
    formal_expression: U(1)_EM
    value: null
    description: QED is a U(1) gauge theory
    checkable: false
    required_theorems:
    - gauge_invariance
    - ward_takahashi_identity
  reward_multiplier: 0.2
  characterizing_theorems:

    polarization not yet detected.'
  boundary_conditions:
  - name: slow_roll_inflation
    boundary_type: theorem_dependent
    formal_expression: "\u03B5 = (M_Pl\xB2/2)(V'/V)\xB2 << 1, \u03B7 = M_Pl\xB2(V''/V)\

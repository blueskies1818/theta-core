- name: qft_divergence
  zone_type: breakdown
  description: "Non-renormalizable divergences in quantum field theory. Perturbative\
    \ quantum gravity (graviton spin-2 field on flat spacetime) has infinite UV divergences\
    \ at two loops that cannot be absorbed by renormalizing a finite number of parameters.\
    \ This is a mathematical breakdown of the perturbative approach \u2014 not necessarily\
    \ of the underlying theory."
  boundary_conditions:
  - name: non_renormalizable_interaction
    boundary_type: energy_scale
    formal_expression: "Operator dimension > 4 \u2192 coupling has negative mass dimension\
      \ \u2192 perturbation theory breaks down at E ~ \u039B"
    value: null
    description: Non-renormalizable operators cause perturbative breakdown
    checkable: false
    required_theorems: []
  - name: landau_pole
    boundary_type: energy_scale
    formal_expression: "Running coupling g(\u03BC) diverges at finite scale \u03BC\
      \ = \u039B_Landau"
    value: null
    description: 'Landau pole: coupling blows up at finite energy'
    checkable: false
    required_theorems: []
  reward_multiplier: 2.0

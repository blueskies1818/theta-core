    formal_expression: "\u03B4g_\u03BC\u03BD / g_\u03BC\u03BD ~ 1"
    value: null
    description: Metric fluctuations become order unity at Planck scale
    checkable: false
    required_theorems: []
  reward_multiplier: 3.0

  - thermalization_quantum_systems
- name: quantum_gravity
  zone_type: uncertain
  description: 'The quantum gravity regime: where general relativity and quantum mechanics
    must both be accounted for. No experimentally confirmed theory exists. Competing
    approaches include string theory, loop quantum gravity, asymptotic safety, causal
    dynamical triangulations, and causal set theory.'
  boundary_conditions:
  - name: planck_scale_energy
    boundary_type: energy_scale
    formal_expression: "E ~ M_Planck \u2248 1.22 \xD7 10^19 GeV"
    value: 1.22e+19
    description: Energy scale where quantum gravity effects become dominant
    checkable: false
    required_theorems: []
  - name: planck_length
    boundary_type: length_scale
    formal_expression: "L ~ l_Planck \u2248 1.616 \xD7 10^-35 m"
    value: 1.616e-35
    description: Length scale where spacetime is expected to be quantized
    checkable: false
    required_theorems: []
  reward_multiplier: 2.0
  characterizing_theorems:

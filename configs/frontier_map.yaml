- name: gr_qft_incompatibility
  zone_type: breakdown
  description: "The fundamental incompatibility between General Relativity and Quantum\
    \ Field Theory. GR describes spacetime as a dynamical geometry; QFT describes\
    \ matter as operator-valued distributions on a fixed background. At the Planck\
    \ scale, quantum fluctuations of the metric become of order unity \u2014 you cannot\
    \ treat spacetime as a fixed background, and you cannot quantize a theory where\
    \ the stage itself is part of the play."
  boundary_conditions:
  - name: planck_scale_where_gr_and_qft_clash
    boundary_type: energy_scale
    formal_expression: "E \u2265 M_Planck \u2248 1.22 \xD7 10^19 GeV"
    value: 1.22e+19
    description: Energy where quantum gravitational effects are O(1)
    checkable: false
    required_theorems: []
  - name: metric_fluctuations_order_unity

    \ 0, density \u03C1 \u2192 \u221E, and curvature R \u2192 \u221E. This is the\
    \ beginning of time in classical GR \u2014 a boundary to spacetime itself. The\
    \ singularity theorems guarantee this under reasonable assumptions (Hawking-Penrose)."
  boundary_conditions:
  - name: flrw_initial_singularity
    boundary_type: theorem_dependent
    formal_expression: "a(t) \u2192 0 as t \u2192 0, \u03C1 \u221D a^{-3(1+w)} \u2192\
      \ \u221E, R \u221D a^{-2} (\xE4/a + (\u0227/a)\xB2) \u2192 \u221E"
    value: null
    description: FLRW cosmological singularity conditions
    checkable: false
    required_theorems:

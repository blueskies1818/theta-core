version: 0.1.0
description: Standard frontier map encoding the current state of theoretical physics.
  Zones are defined by formal boundary conditions that can be evaluated against candidate
  mathematical structures. The map guides the explorer toward breakdown zones where
  new physics must exist.
zones:
- name: gr_classical
  zone_type: established
  description: 'Classical general relativity in the weak-to-moderate field regime.
    Einstein field equations hold. Curvature is finite and well-behaved. Experimentally
    confirmed by: perihelion precession, gravitational lensing, Shapiro delay, binary
    pulsar orbital decay, GW150914 waveform (inspiral through ringdown).'
  boundary_conditions:
  - name: einstein_field_equations
    boundary_type: theorem_dependent
    formal_expression: "R_\u03BC\u03BD - (1/2)R g_\u03BC\u03BD + \u039B g_\u03BC\u03BD\
      \ = (8\u03C0G/c\u2074) T_\u03BC\u03BD"
    value: null
    description: Structure must satisfy or generalize the Einstein field equations
    checkable: false
    required_theorems:
    - einstein_field_equations
    - ricci_tensor
    - hilbert_action
  - name: weak_field_limit
    boundary_type: curvature
    formal_expression: "|\u03A6| << c\xB2"
    value: null
    description: "Newtonian potential much less than c\xB2 \u2014 weak field"
    checkable: false
    required_theorems: []
  - name: classical_regime
    boundary_type: length_scale
    formal_expression: "L >> l_Planck \u2248 1.616e-35 m"
    value: 1.616e-35
    description: Length scales much larger than Planck length
    checkable: false
    required_theorems: []
  reward_multiplier: 0.3
  characterizing_theorems:
  - einstein_field_equations
  - birkhoff_theorem
  - no_hair_theorem
  - positive_energy_theorem
  known_structures:
  - Einstein-Hilbert action
  - Schwarzschild metric
  - Kerr metric
  - FLRW metric
  - Friedmann equations
  open_problems:
  - cosmic_censorship_hypothesis
  - final_state_conjecture
- name: standard_model
  zone_type: established
  description: "The Standard Model of particle physics: SU(3)\xD7SU(2)\xD7U(1) gauge\
    \ theory. Experimentally confirmed up to ~13 TeV (LHC). All predicted particles\
    \ observed including the Higgs boson (2012)."
  boundary_conditions:
  - name: su3_su2_u1_gauge_group
    boundary_type: gauge_group
    formal_expression: "SU(3)_C \xD7 SU(2)_L \xD7 U(1)_Y"
    value: null
    description: Structure must contain or generalize the Standard Model gauge group
    checkable: false
    required_theorems:
    - gauge_theory
    - yang_mills_theory
    - higgs_mechanism
  - name: higgs_mechanism
    boundary_type: theorem_dependent
    formal_expression: "Spontaneous symmetry breaking: SU(2)_L \xD7 U(1)_Y \u2192\
      \ U(1)_EM"
    value: null
    description: Electroweak symmetry breaking via Higgs mechanism
    checkable: false
    required_theorems:
    - higgs_mechanism
    - spontaneous_symmetry_breaking
  - name: particle_content
    boundary_type: conservation
    formal_expression: "3 generations: (u,d), (c,s), (t,b) quarks; e, \u03BC, \u03C4\
      \ leptons; \u03BD_e, \u03BD_\u03BC, \u03BD_\u03C4 neutrinos; \u03B3, W\xB1,\
      \ Z, g, H bosons"
    value: null
    description: Known particle content with correct quantum numbers
    checkable: false
    required_theorems: []
  reward_multiplier: 0.3
  characterizing_theorems:
  - noether_theorem
  - ward_identities
  - lsz_reduction
  - optical_theorem
  - cpt_theorem
  known_structures:
  - Standard Model Lagrangian
  - QCD Lagrangian
  - Electroweak Lagrangian
  - Yukawa couplings
  open_problems:

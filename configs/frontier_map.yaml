- name: black_hole_singularity
  zone_type: breakdown
  description: "Black hole singularities: regions where spacetime curvature becomes\
    \ infinite. Penrose-Hawking singularity theorems prove these are generic in GR,\
    \ not artifacts of symmetry. Geodesic incompleteness means time ends for infalling\
    \ observers \u2014 a pathological prediction that signals GR's incompleteness."
  boundary_conditions:
  - name: penrose_hawking_conditions
    boundary_type: theorem_dependent
    formal_expression: "Trapped surface + null energy condition + generic condition\
      \ + global hyperbolicity (or appropriate causality) \u2192 singularity"
    value: null
    description: Penrose-Hawking singularity theorem conditions
    checkable: false
    required_theorems:
    - penrose_singularity_theorem
    - hawking_singularity_theorem
    - penrose_hawking_singularity_theorems
  - name: curvature_blowup
    boundary_type: curvature
    formal_expression: "Kretschmann scalar K = R_\u03BC\u03BD\u03C1\u03C3 R^\u03BC\
      \u03BD\u03C1\u03C3 \u2192 \u221E"
    value: null
    description: Curvature invariants diverge at the singularity
    checkable: false
    required_theorems: []

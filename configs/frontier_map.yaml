  - missing_satellite_problem
  - too_big_to_fail_problem
- name: dark_energy
  zone_type: uncertain
  description: "Dark energy: ~68% of the universe's energy budget. Drives accelerated\
    \ cosmic expansion. The cosmological constant problem \u2014 the 120-orders-of-magnitude\
    \ discrepancy between QFT vacuum energy and observed \u039B \u2014 remains the\
    \ largest quantitative mismatch in physics."
  boundary_conditions:
  - name: cosmological_constant_problem
    boundary_type: theorem_dependent
    formal_expression: "\u03C1_vac(QFT) / \u03C1_vac(obs) \u2248 10^120"
    value: null

# GRPO Self-Play Training Configuration (Phase 1)
# Corresponds to GRPOConfig in src/utils/config.py

training:
  learning_rate: 1.0e-6       # Lower LR for stability (was 5.0e-6)
  kl_beta: 0.1               # KL penalty (was 0.01 — too weak, KL exploded to 309)
  group_size: 2               # K proofs generated per theorem (reduced for CPU headroom)
  batch_theorems: 2           # Theorems per training step (2 * 2 = 4 generations)
  gradient_accumulation_steps: 4
  max_steps: 2000              # Compensate with more steps: same total generations
  save_every: 200
  eval_every: 200
  log_every: 10

generation:
  max_new_tokens: 64          # Short proofs only — model appends artifacts beyond
  temperature: 0.4            # Lower temp for higher validity rate (was 0.6)
  top_p: 0.95
  do_sample: true

optimizer:
  beta1: 0.9
  beta2: 0.95
  weight_decay: 0.1
  warmup_steps: 100
  max_grad_norm: 1.0

proof_checker:
  timeout_seconds: 30.0        # lake env lean --stdin takes ~3s just to load Mathlib4
  max_workers: 3               # Parallel proof checking (reduced: leave CPU headroom)
  cache_size: 50000            # Number of results to cache

replay_buffer:
  max_size: 10000
  sample_batch_size: 16

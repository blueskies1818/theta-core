<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>theta-core — How It Thinks (Age 14+)</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background: linear-gradient(135deg, #0a0a2e 0%, #1a0a3e 50%, #0a1a2e 100%);
  color:#e0e0ff; font-family:'Segoe UI',sans-serif; height:100vh; overflow:hidden; }
#dashboard { display:grid; grid-template-columns:280px 1fr; height:100vh; }

#brain-panel { background:rgba(10,10,40,0.95); border-right:2px solid #333; 
  padding:20px; display:flex; flex-direction:column; align-items:center; }
#brain-title { color:#ffcc00; font-size:1.3em; margin-bottom:10px; text-align:center; }
#brain-icon { font-size:5em; margin:10px 0; animation:thinkPulse 2s infinite; }
@keyframes thinkPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
#brain-label { color:#aaa; font-size:0.85em; text-align:center; margin-bottom:20px; }

.component { background:#1a1a3a; border:2px solid #2a2a5a; border-radius:12px;
  padding:12px; margin:6px 0; width:100%; text-align:center; font-size:0.9em;
  transition:all 0.4s; opacity:0.5; }
.component.active { border-color:#ffcc00; box-shadow:0 0 15px rgba(255,204,0,0.3); 
  opacity:1; transform:scale(1.03); }
.component.done { border-color:#66ff66; opacity:0.8; }
.comp-name { font-weight:bold; font-size:0.95em; }
.comp-status { font-size:0.75em; color:#888; margin-top:4px; }
.component.active .comp-status { color:#ffcc00; }
.component.done .comp-status { color:#66ff66; }

#main-stage { display:flex; flex-direction:column; padding:30px; position:relative; 
  overflow:hidden; }
#thought-bubble { background:rgba(255,255,255,0.05); border:1px solid #444; 
  border-radius:20px; padding:25px; min-height:120px; margin-bottom:20px;
  font-size:1.1em; line-height:1.6; position:relative; }
#thought-bubble:before { content:'💭'; position:absolute; top:-15px; left:20px; 
  font-size:1.5em; }
#thought-text { color:#e0e0ff; }
#progress-bar { height:4px; background:#2a2a5a; border-radius:2px; margin:10px 0 20px; }
#progress-fill { height:100%; background:linear-gradient(90deg,#ffcc00,#ff9900);
  border-radius:2px; width:0%; transition:width 0.5s; }

#discovery-area { background:rgba(0,0,0,0.3); border:1px solid #333; border-radius:16px;
  padding:25px; min-height:150px; display:flex; flex-direction:column;
  align-items:center; justify-content:center; }
#discovery-text { font-size:1.4em; color:#66ff66; text-align:center; display:none; }
#discovery-eq { font-size:2em; color:#ffcc00; font-family:monospace; margin:10px 0; 
  display:none; animation:popIn 0.5s; }
@keyframes popIn { 0%{transform:scale(0);opacity:0} 70%{transform:scale(1.1)} 
  100%{transform:scale(1);opacity:1} }

#play-btn { background:#ff9900; color:#0a0a1a; border:none; padding:14px 44px;
  font-size:1.2em; font-weight:bold; border-radius:30px; cursor:pointer;
  position:absolute; bottom:30px; right:30px; transition:all 0.2s; z-index:10; }
#play-btn:hover { transform:scale(1.05); background:#ffaa22; }
#play-btn:disabled { background:#555; cursor:default; transform:none; }

#data-flow { position:absolute; top:0; left:0; width:100%; height:100%; 
  pointer-events:none; }
.particle { position:absolute; width:6px; height:6px; background:#ffcc00; 
  border-radius:50%; opacity:0; animation:flow 2s linear infinite; }
@keyframes flow { 0%{opacity:0;transform:translate(0,0)} 20%{opacity:1} 
  80%{opacity:1} 100%{opacity:0;transform:translate(200px,-100px)} }

.badge { display:inline-block; background:#ff9900; color:#0a0a1a; padding:3px 12px;
  border-radius:12px; font-weight:bold; font-size:0.85em; margin:3px; 
  animation:badgeIn 0.3s; }
@keyframes badgeIn { 0%{transform:scale(0)} 100%{transform:scale(1)} }
</style>
</head>
<body>
<div id="dashboard">
  <!-- BRAIN PANEL — persistent model representation -->
  <div id="brain-panel">
    <div id="brain-title">🧠 The Learning System</div>
    <div id="brain-icon">⚛️</div>
    <div id="brain-label">Pre-1905 Knowledge</div>
    
    <div class="component" id="comp-sense"><div class="comp-name">👁️ Observe</div>
      <div class="comp-status">waiting...</div></div>
    <div class="component" id="comp-classify"><div class="comp-name">🏷️ Classify</div>
      <div class="comp-status">waiting...</div></div>
    <div class="component" id="comp-compose"><div class="comp-name">🧩 Compose</div>
      <div class="comp-status">waiting...</div></div>
    <div class="component" id="comp-symmetry"><div class="comp-name">🔍 Symmetry</div>
      <div class="comp-status">waiting...</div></div>
    <div class="component" id="comp-search"><div class="comp-name">🧪 Search</div>
      <div class="comp-status">waiting...</div></div>
    <div class="component" id="comp-hidden"><div class="comp-name">❓ Hidden</div>
      <div class="comp-status">waiting...</div></div>
    <div class="component" id="comp-prove"><div class="comp-name">📐 Prove</div>
      <div class="comp-status">waiting...</div></div>
  </div>
  
  <!-- MAIN STAGE -->
  <div id="main-stage">
    <div id="thought-bubble"><div id="thought-text">
      The system is idle. Click ▶ to start the discovery process...
    </div></div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    
    <div id="discovery-area">
      <div id="discovery-text"></div>
      <div id="discovery-eq"></div>
    </div>
    
    <button id="play-btn" onclick="startPipeline()">▶ Start Discovery</button>
    <div id="data-flow"></div>
  </div>
</div>

<script>
const components = ['sense','classify','compose','symmetry','search','hidden','prove'];
const badges = {
  gravity:'Gravity ⚡', spring:'Springs 🔧', energy:'Energy ⚡',
  quantum:'Quantum 🌌', relativity:'Relativity 🚀', discovered:'DISCOVERED 🎉'
};

const scenes = [
  { comp:'sense', status:'Receiving data...', 
    thought:'The system receives raw measurements from a bouncing spring with gravity.<br><br>It sees: mass=1kg, height changing, speed changing, spring stretching.<br><br>It doesn\'t know what "energy" or "conservation" means. Just numbers.',
    duration:4 },
  { comp:'classify', status:'Identifying patterns...',
    thought:'"I\'ve seen numbers like this before. Height and speed changing together — that\'s gravity. Spring stretching — that\'s springs."<br><br>Each pattern was learned from pre-1905 physics: falling balls, pendulums, oscillating springs.<br><br>Two patterns firing at once!',
    duration:3.5 },
  { comp:'compose', status:'Combining templates...',
    thought:'From gravity training: "Whenever I see mass, height, and speed, <b>mgh + ½mv²</b> stays the same."<br><br>From spring training: "Whenever I see spring stiffness and stretch, <b>½kx² + ½mv²</b> stays the same."<br><br>Both are active! Let me combine them...',
    duration:4 },
  { comp:'symmetry', status:'Finding the rules...',
    thought:'"Time passes the same way at every moment I measured. That means something MUST be conserved."<br><br>This is a deep pattern — when time behaves the same everywhere, there\'s always a number that never changes. Physics calls this Noether\'s theorem.',
    duration:3.5 },
  { comp:'search', status:'Testing candidates...',
    thought:'The system tries every math combination:<br><br>m+v → <span style="color:#ff6666">changes ✗</span><br>m×g×h → <span style="color:#ff6666">changes ✗</span><br>½×m×v² → <span style="color:#ff6666">changes ✗</span><br><br>m×g×h + ½×m×v² + ½×k×x² → <span style="color:#66ff66">SAME EVERY TIME ✓✓✓</span><br><br>At t=0: 19.60. At t=0.2: 19.57. At t=0.5: 19.72. Nearly identical!',
    duration:5 },
  { comp:'hidden', status:'Looking deeper...',
    thought:'For hydrogen spectrum, every combination failed! But the failures weren\'t random — they curved like 1/n².<br><br>"There\'s a counting number hiding in this data!"<br><br>The system learned this trick from 1800s standing waves on violin strings, where the pattern is n=1,2,3...<br><br>It proposes: hidden integer n, use n². Suddenly E×n² is constant!',
    duration:5 },
  { comp:'prove', status:'Writing proof...',
    thought:'"It was constant when I checked 10 times. Is it ALWAYS constant?"<br><br>The system writes a mathematical proof: for ALL masses, ALL heights, ALL times — this expression never changes.<br><br>No more checking. Proven forever.',
    duration:3.5 }
];

function activateComponent(id, status) {
  document.getElementById('comp-'+id).classList.add('active');
  document.getElementById('comp-'+id).querySelector('.comp-status').textContent = status;
  components.filter(c=>components.indexOf(c)<components.indexOf(id)).forEach(c=>
    document.getElementById('comp-'+c).classList.add('done'));
}

function spawnParticles() {
  const container = document.getElementById('data-flow');
  for(let i=0;i<15;i++) {
    setTimeout(()=>{
      const p = document.createElement('div'); p.className='particle';
      p.style.left=(20+Math.random()*60)+'%';
      p.style.top=(10+Math.random()*80)+'%';
      p.style.animationDuration=(1.5+Math.random()*2)+'s';
      p.style.animationDelay=Math.random()+'s';
      container.appendChild(p);
      setTimeout(()=>p.remove(),3000);
    },i*150);
  }
}

async function startPipeline() {
  const btn = document.getElementById('play-btn');
  btn.disabled = true; btn.textContent = '⏳ Discovering...';
  document.getElementById('discovery-text').style.display = 'none';
  document.getElementById('discovery-eq').style.display = 'none';
  document.getElementById('progress-fill').style.width = '0%';
  components.forEach(c=>{document.getElementById('comp-'+c).className='component';});
  
  for(let i=0;i<scenes.length;i++) {
    const s = scenes[i];
    activateComponent(s.comp, s.status);
    document.getElementById('thought-text').innerHTML = s.thought;
    document.getElementById('progress-fill').style.width = ((i+1)/scenes.length*90)+'%';
    spawnParticles();
    await new Promise(r=>setTimeout(r,s.duration*1000));
  }
  
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('thought-text').innerHTML = 
    'The system has finished. Here\'s what it found — without ever being told what "energy" is:';
  document.getElementById('discovery-text').style.display = 'block';
  document.getElementById('discovery-text').innerHTML = 
    '⚡ <b>8 post-1905 laws discovered from pre-1905 training</b>';
  document.getElementById('discovery-eq').style.display = 'block';
  document.getElementById('discovery-eq').innerHTML = 
    'mgh + ½mv² + ½kx² = constant → Energy!';
  
  components.forEach(c=>document.getElementById('comp-'+c).className='component done');
  btn.disabled = false; btn.textContent = '▶ Play Again';
}
</script>
</body>
</html>

version: 0.1.0
description: "Standard failure coordinate system encoding known breakdown points in\
  \ theoretical physics. Each point represents a specific condition where GR, QFT,\
  \ or the Standard Model fails. Candidate structures are evaluated at these coordinates\
  \ \u2014 resolving failures earns reward; reproducing them incurs penalty."
failure_points:
- name: planck_scale_divergence
  regime: planck_scale
  severity: catastrophic
  description: At the Planck scale (E ~ 10^19 GeV, L ~ 10^-35 m), quantum fluctuations
    of the spacetime metric become of order unity. GR predicts smooth geometry; QFT
    predicts violent quantum fluctuations. Neither framework works. Perturbative quantum
    gravity has non-renormalizable divergences at two loops.
  formal_condition: "Compton wavelength \u03BB_C = \u0127/(m c) equals Schwarzschild\
    \ radius r_s = 2Gm/c\xB2 \u2192 m = m_Planck = sqrt(\u0127c/G) \u2248 2.176\xD7\
    10^-8 kg \u2248 1.22\xD710^19 GeV/c\xB2"
  energy_scale_gev: 1.22e+19
  length_scale_m: 1.616e-35
  failing_theories:
  - General Relativity
  - Quantum Field Theory
  - Standard Model
  reward_solve_bonus: 3.0
  reward_reproduce_penalty: 1.5
  related_theorems:
  - penrose_hawking_singularity_theorems
  - weinberg_witten_theorem
  - power_counting_theorem
  resolution_candidates:
  - 'String theory: finite UV completion via extended objects'
  - 'Loop quantum gravity: discrete spacetime at Planck scale'
  - 'Asymptotic safety: non-perturbative UV fixed point'
  - 'Causal set theory: discrete causal structure'
- name: black_hole_singularity
  regime: singularity
  severity: catastrophic
  description: "Inside every black hole, GR predicts a spacetime singularity \u2014\
    \ a region of infinite curvature where time ends. Penrose (1965) proved this is\
    \ generic: any collapsing star that forms a trapped surface must develop a singularity.\
    \ Geodesic incompleteness means the theory cannot predict what happens to infalling\
    \ observers."
  formal_condition: "Existence of a trapped surface + null energy condition R_ab k^a\
    \ k^b \u2265 0 + generic condition + no closed timelike curves \u2192 incomplete\
    \ causal geodesic"
  energy_scale_gev: null
  length_scale_m: null
  failing_theories:
  - General Relativity
  reward_solve_bonus: 2.5
  reward_reproduce_penalty: 1.5
  related_theorems:
  - penrose_1965_singularity_theorem
  - hawking_penrose_1970
  - cosmic_censorship_conjecture
  resolution_candidates:
  - 'Quantum gravity: singularity replaced by Planck-scale structure'
  - 'Loop quantum gravity: bounce at Planck density'
  - 'String theory: fuzzball proposal for black hole interiors'
  - 'Regular black holes: Bardeen, Hayward, etc. (avoidance, not resolution)'
- name: big_bang_initial_singularity
  regime: cosmological
  severity: catastrophic
  description: "At t=0 in standard cosmology, the FLRW scale factor a(t) \u2192 0,\
    \ density \u03C1 \u2192 \u221E, and curvature R \u2192 \u221E. The Borde-Guth-Vilenkin\
    \ theorem shows that any universe that is on average expanding must be past-geodesically\
    \ incomplete \u2014 the singularity is not an artifact of symmetry assumptions."
  formal_condition: "FLRW metric: ds\xB2 = -dt\xB2 + a(t)\xB2 [dr\xB2/(1-kr\xB2) +\
    \ r\xB2 d\u03A9\xB2]. a(t) \u2192 0 as t \u2192 0. \u03C1 \u221D a^{-3(1+w)} \u2192\
    \ \u221E. R \u221D (\xE4/a + (\u0227/a)\xB2 + k/a\xB2) \u2192 \u221E."
  energy_scale_gev: 1.22e+19
  length_scale_m: 1.616e-35
  failing_theories:
  - General Relativity
  - "Standard Model of Cosmology (\u039BCDM)"
  reward_solve_bonus: 2.5
  reward_reproduce_penalty: 1.5
  related_theorems:
  - hawking_penrose_singularity_theorems
  - borde_guth_vilenkin_theorem
  resolution_candidates:
  - 'Hartle-Hawking no-boundary proposal: Euclidean signature at origin'
  - 'Loop quantum cosmology: big bounce from previous contraction'
  - 'String gas cosmology: Hagedorn phase avoids singularity'
  - 'Emergent spacetime: time emerges from a timeless fundamental state'
- name: perturbative_quantum_gravity_non_renormalizable
  regime: quantum_gravity
  severity: catastrophic
  description: Treating GR as a perturbative QFT of spin-2 gravitons on flat spacetime
    produces non-renormalizable divergences at two-loop order. An infinite number
    of counterterms are needed to absorb UV divergences. This means perturbative quantum
    GR has no predictive power at high energies.
  formal_condition: "Einstein-Hilbert action S = (1/16\u03C0G) \u222B d\u2074x \u221A\
    (-g) R. Expand g_\u03BC\u03BD = \u03B7_\u03BC\u03BD + \u03BA h_\u03BC\u03BD where\
    \ \u03BA = sqrt(32\u03C0G). Two-loop counterterm: R_\u03BC\u03BD\u03C1\u03C3 R_\u03C1\
    \u03C3\u03B1\u03B2 R_\u03B1\u03B2^\u03BC\u03BD. Requires infinite counterterms\
    \ \u2192 non-renormalizable by power counting. G has mass dimension -2 \u2192\
    \ each loop adds two powers of external momentum."
  energy_scale_gev: 1.22e+19
  length_scale_m: null
  failing_theories:
  - General Relativity (perturbative)
  - Effective Field Theory of Gravity
  reward_solve_bonus: 2.0
  reward_reproduce_penalty: 1.0
  related_theorems:
  - power_counting_theorem
  - weinberg_theorem_low_energy
  resolution_candidates:
  - 'String theory: UV finite due to extended nature of strings'
  - 'Asymptotic safety: non-perturbative UV fixed point'
  - "Ho\u0159ava-Lifshitz gravity: anisotropic scaling improves UV behavior"
  - 'Causal dynamical triangulations: non-perturbative lattice approach'
- name: cosmological_constant_problem
  regime: cosmological
  severity: pathological
  description: "QFT predicts vacuum energy density \u03C1_vac ~ M_Planck^4 \u2248\
    \ 10^76 GeV^4. Observed dark energy density is \u03C1_\u039B \u2248 10^-47 GeV^4.\
    \ This 120-orders-of-magnitude mismatch is the largest quantitative failure in\
    \ all of physics. Even with supersymmetry above the TeV scale, the mismatch is\
    \ still ~60 orders of magnitude."
  formal_condition: "\u03C1_vac(QFT) = (1/2) \u03A3_i (-1)^F \u222B\u2080^\u039B_UV\
    \ d\xB3k/(2\u03C0)\xB3 sqrt(k\xB2 + m_i\xB2) ~ \u039B_UV\u2074. For \u039B_UV\
    \ = M_Planck: \u03C1_vac \u2248 10^76 GeV\u2074. Observed: \u03C1_\u039B = \u03A9\
    _\u039B \u03C1_crit = 0.6889 \xD7 (2.775\xD710^11 h\xB2 eV\u2074) \u2248 10^-47\
    \ GeV\u2074."
  energy_scale_gev: 2.3e-42
  length_scale_m: null
  failing_theories:
  - Quantum Field Theory
  - Standard Model
  - General Relativity
  reward_solve_bonus: 3.0
  reward_reproduce_penalty: 1.0
  related_theorems:
  - weinberg_no_go_theorem
  - positive_energy_theorem
  resolution_candidates:
  - 'Anthropic landscape: our vacuum is one of many (string theory)'
  - 'Unimodular gravity: CC decouples from field equations'
  - 'Degravitation: massive gravity filters out vacuum energy'
  - 'Dynamical dark energy: CC relaxes to small value via scalar field'
- name: hierarchy_problem
  regime: high_energy_qft
  severity: pathological
  description: "The Higgs boson mass (125 GeV) is 17 orders of magnitude smaller than\
    \ the Planck scale. In QFT, scalar masses receive quantum corrections \u03B4m_H\xB2\
    \ ~ \u039B_UV\xB2 from every particle it couples to. Explaining m_H << M_Planck\
    \ requires extreme fine-tuning unless new physics (SUSY, compositeness, extra\
    \ dimensions) appears at the TeV scale."
  formal_condition: "m_H\xB2 = m_H0\xB2 + \u03B4m_H\xB2. \u03B4m_H\xB2 ~ (y_t\xB2\
    /(16\u03C0\xB2)) \u039B_UV\xB2 + (g\xB2/(64\u03C0\xB2)) \u039B_UV\xB2 + ... For\
    \ \u039B_UV = M_Planck \u2248 1.22\xD710^19 GeV, \u03B4m_H\xB2 \u2248 10^36 GeV\xB2\
    . But m_H\xB2(observed) \u2248 (125 GeV)\xB2 \u2248 1.56\xD710^4 GeV\xB2. Cancellation\
    \ requires fine-tuning to 1 part in 10^32."
  energy_scale_gev: 125.0
  length_scale_m: null
  failing_theories:
  - Standard Model (as a complete theory)
  reward_solve_bonus: 2.0
  reward_reproduce_penalty: 1.0
  related_theorems:
  - naturalness_principle
  - wilsonian_renormalization_group
  resolution_candidates:
  - 'SUSY: fermion/boson loop cancellations above TeV scale'
  - 'Composite Higgs: Higgs is a bound state, form factor at TeV'
  - 'Large extra dimensions: fundamental Planck scale lowered to TeV'
  - 'Relaxion mechanism: dynamical relaxation of Higgs mass during inflation'
- name: strong_cp_problem
  regime: high_energy_qft
  severity: pathological
  description: "QCD allows a CP-violating term (\u03B8/32\u03C0\xB2) G_\u03BC\u03BD\
    ^a G\u0303^{a \u03BC\u03BD} in the Lagrangian. The parameter \u03B8 is experimentally\
    \ constrained to |\u03B8| < 10^-10 from neutron electric dipole moment limits.\
    \ QFT provides no explanation for why \u03B8 is so small \u2014 it's a dimensionless\
    \ parameter that could naturally be O(1)."
  formal_condition: "L_QCD \u2283 (\u03B8/32\u03C0\xB2) G_\u03BC\u03BD^a G\u0303^{a\
    \ \u03BC\u03BD}. d_n \u2248 5.2\xD710^-16 \u03B8 e\xB7cm (neutron EDM). Experiment:\
    \ |d_n| < 1.8\xD710^-26 e\xB7cm \u2192 |\u03B8| < 10^-10."
  energy_scale_gev: null
  length_scale_m: null
  failing_theories:
  - Quantum Chromodynamics
  - Standard Model
  reward_solve_bonus: 1.5
  reward_reproduce_penalty: 0.5
  related_theorems:
  - index_theorem
  - chiral_anomaly
  resolution_candidates:
  - "Peccei-Quinn mechanism: \u03B8 promoted to dynamical axion field"
  - 'Nelson-Barr mechanism: CP violation is spontaneous'
  - Massless up quark solution (disfavored by lattice QCD)
- name: dark_matter_identity
  regime: cosmological
  severity: incomplete
  description: ~27% of the universe's energy density is in the form of dark matter.
    Its gravitational effects are precisely measured (CMB, galaxy rotation curves,
    gravitational lensing, bullet cluster) but its particle nature is unknown. The
    Standard Model has no candidate particle with the right properties. Sterile neutrinos,
    axions, WIMPs, and primordial black holes are all viable.
  formal_condition: "\u03A9_CDM h\xB2 = 0.11933 \xB1 0.00091 (Planck 2018). Dark matter\
    \ must be: cold or warm (not hot), collisionless or weakly self-interacting, stable\
    \ on cosmological timescales, produced in the early universe with the correct\
    \ relic abundance."
  energy_scale_gev: null
  length_scale_m: null
  failing_theories:
  - Standard Model of Particle Physics
  reward_solve_bonus: 2.0
  reward_reproduce_penalty: 0.0
  related_theorems:
  - virial_theorem
  - freeze_out_mechanism
  resolution_candidates:
  - 'WIMP: weak-scale particle with freeze-out relic abundance'
  - 'Axion: solves strong CP + provides dark matter via misalignment'
  - 'Sterile neutrino: keV-scale, produced via oscillation'
  - 'Primordial black holes: formed before BBN'
  - 'Modified gravity: MOND, TeVeS (alters gravity, not particle)'
- name: neutrino_masses
  regime: high_energy_qft
  severity: incomplete
  description: "Neutrino oscillations prove neutrinos have mass (\u0394m\xB2_21 \u2248\
    \ 7.5\xD710^-5 eV\xB2, |\u0394m\xB2_31| \u2248 2.5\xD710^-3 eV\xB2). But the Standard\
    \ Model predicts massless neutrinos because it has no right-handed neutrino fields.\
    \ The smallness of neutrino masses (m_\u03BD < 0.1 eV) compared to charged fermions\
    \ (m_e = 0.511 MeV, m_t = 173 GeV) requires explanation."
  formal_condition: "Standard Model: L \u2283 -y_\u03BD L\u0304 H \u03BD_R (requires\
    \ \u03BD_R, not in minimal SM). Seesaw: m_\u03BD ~ y\xB2 v\xB2/M_R. For m_\u03BD\
    \ ~ 0.1 eV, y ~ 1 \u2192 M_R ~ 10^14 GeV. Alternative: radiative mass generation\
    \ at loop level."
  energy_scale_gev: 1.0e-10
  length_scale_m: null
  failing_theories:
  - Standard Model (minimal)
  reward_solve_bonus: 1.0
  reward_reproduce_penalty: 0.0
  related_theorems:
  - seesaw_mechanism
  - lepton_number_violation
  resolution_candidates:
  - 'Type I seesaw: heavy right-handed neutrinos at GUT scale'
  - 'Type II seesaw: heavy SU(2)_L triplet scalar'
  - 'Type III seesaw: heavy SU(2)_L triplet fermions'
  - 'Radiative: loop-suppressed masses (Zee, Ma models)'
- name: baryon_asymmetry
  regime: cosmological
  severity: incomplete
  description: "The universe contains matter but almost no antimatter: \u03B7 = (n_B\
    \ - n_\u1E06)/n_\u03B3 \u2248 6\xD710^-10. The Standard Model has all three Sakharov\
    \ conditions (baryon number violation via sphalerons, C and CP violation in the\
    \ CKM matrix, out-of-equilibrium via electroweak phase transition), but the CP\
    \ violation is too small by ~10 orders of magnitude and the phase transition is\
    \ a crossover, not first-order, at the measured Higgs mass."
  formal_condition: "Sakharov conditions: (1) B violation, (2) C and CP violation,\
    \ (3) departure from thermal equilibrium. Observed: \u03B7_CMB = (6.104 \xB1 0.058)\xD7\
    10^-10 (Planck 2018). SM prediction: too small by factor ~10^-10."
  energy_scale_gev: 100.0
  length_scale_m: null
  failing_theories:
  - Standard Model of Particle Physics
  - Standard Cosmology
  reward_solve_bonus: 1.5
  reward_reproduce_penalty: 0.5
  related_theorems:
  - sakharov_conditions
  - electroweak_baryogenesis
  resolution_candidates:
  - "Leptogenesis: lepton asymmetry \u2192 baryon asymmetry via sphalerons"
  - Electroweak baryogenesis with BSM CP violation (needs 1st-order PT)
  - 'GUT baryogenesis: heavy boson decays at GUT scale'
  - 'Affleck-Dine mechanism: scalar condensate in SUSY'
- name: gr_qft_mutual_incompatibility
  regime: quantum_gravity
  severity: tension
  description: "GR and QFT are built on contradictory mathematical foundations. GR:\
    \ spacetime is a dynamical manifold, background-independent. QFT: fields are operator-valued\
    \ distributions on fixed Minkowski background. In GR, time is part of the dynamical\
    \ geometry; in QM, time is an external parameter. These frameworks cannot both\
    \ be correct in their current formulations \u2014 yet both are experimentally\
    \ confirmed in their domains."
  formal_condition: "GR action: S = (1/16\u03C0G)\u222B d\u2074x \u221A-g (R - 2\u039B\
    ). QFT action: S = \u222B d\u2074x L_matter(\u03C6, \u2202\u03C6) on \u03B7_\u03BC\
    \u03BD. No consistent quantum theory exists where the metric is simultaneously\
    \ a dynamical field AND a fixed background. The problem of time: Wheeler-DeWitt\
    \ equation \u0124|\u03C8\u27E9 = 0 has no time evolution parameter."
  energy_scale_gev: 1.22e+19
  length_scale_m: 1.616e-35
  failing_theories:
  - General Relativity
  - Quantum Field Theory (jointly)
  reward_solve_bonus: 3.0
  reward_reproduce_penalty: 1.5
  related_theorems:
  - weinberg_witten_theorem
  - marolf_theorem
  - problem_of_time
  resolution_candidates:
  - 'String theory: QFT and GR unified in a single framework'
  - 'Loop quantum gravity: quantize geometry, matter lives on spin networks'
  - 'Causal dynamical triangulations: sum over geometries, non-perturbative'
  - 'Emergent gravity: spacetime is not fundamental (entropic, holographic)'
- name: black_hole_information_paradox
  regime: informational
  severity: tension
  description: "Hawking radiation (1974) implies black holes evaporate into thermal\
    \ radiation that carries no information about what fell in. If the black hole\
    \ completely evaporates, information is destroyed \u2014 violating quantum mechanical\
    \ unitarity. If information is preserved, it requires a modification of either\
    \ QFT in curved spacetime, the no-hair theorem, or the understanding of black\
    \ hole evaporation."
  formal_condition: "Hawking temperature: T_H = \u0127c\xB3/(8\u03C0GM k_B). Bekenstein-Hawking\
    \ entropy: S_BH = k_B c\xB3 A/(4G\u0127). Unitarity requires: \u03C1_final = S\
    \ \u03C1_initial S\u2020 for some S matrix. But Hawking's calculation gives: \u03C1\
    _final = Tr_env |\u03C8\u27E9\u27E8\u03C8| (mixed state). Page curve: S_vN must\
    \ follow S_BH(t) for information preservation."
  energy_scale_gev: null
  length_scale_m: null
  failing_theories:
  - Quantum Field Theory in Curved Spacetime
  - General Relativity
  reward_solve_bonus: 2.5
  reward_reproduce_penalty: 1.0
  related_theorems:
  - bekenstein_hawking_entropy
  - holographic_principle
  - page_theorem
  resolution_candidates:
  - 'AdS/CFT: black hole evaporation is unitary in dual CFT'
  - 'Island formula: entanglement wedge reconstruction'
  - 'Fuzzball proposal: black hole microstates are horizonless'
  - 'Firewall: information preserved but horizon is not smooth'
  - 'Remnant: evaporation stops at Planck scale'

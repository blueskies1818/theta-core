# Reward Configuration for Phase 1
# Fields correspond to src/reward/config.py RewardConfig dataclass.

# Base reward values
valid_proof: 1.0
invalid_proof: 0.0

# Length bonus: shorter proofs get higher reward
length_bonus_enabled: true
length_bonus_weight: 0.1
length_reference_tokens: 100
length_decay_rate: 0.002

# Anti-reward-hacking: reject trivially short proofs
min_proof_tokens: 10

# Curiosity/exploration bonus (Phase 1.5 — CRITICAL for preventing mode collapse)
# Tracks proof signatures and gives bonus for novel proofs.
# bonus = curiosity_weight / sqrt(count + 1)
curiosity_enabled: true
curiosity_weight: 0.05               # Max bonus for completely novel proofs
curiosity_signature_length: 200      # First N chars used for proof signature
curiosity_max_tracked: 100000        # Max number of signatures to track

# H3 Graph-traversal bonus: rewards proofs using lemmas far from training
# distribution in the dependency graph. "Far" = 3+ hops from any training lemma.
# This encourages the GNN to explore deeper graph regions during training,
# which should improve lemma-novelty generalization on Gate 3 tests.
traversal_bonus_enabled: true
traversal_bonus_weight: 0.5          # Max bonus for fully novel lemma usage
traversal_hop_threshold: 3           # Minimum graph distance to count as "far"
